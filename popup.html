<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #18181b;
      color: #f4f4f5;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    h1 span { font-size: 16px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 13px;
      color: #a1a1aa;
    }

    /* Switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #3f3f46;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 16px;
      height: 16px;
      background: #f4f4f5;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .switch input:checked + .slider {
      background: #a78bfa;
    }

    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }

    .hint {
      margin-top: 14px;
      font-size: 11px;
      color: #71717a;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1><span>&#128270;</span> CSS Inspector</h1>

  <div class="toggle-row">
    <span class="toggle-label">Enable overlay</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <p class="hint">Hover over any element on the page to see its margin, padding, font-size, and dimensions.</p>

  <script src="popup.js"></script>
</body>
</html>
